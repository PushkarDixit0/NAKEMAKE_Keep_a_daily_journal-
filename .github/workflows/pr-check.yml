name: PR Lint Check

on:
  pull_request:
    branches:
      - main
      - master
      - development

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PNPM
        run: npm install -g pnpm

      - name: Verify PNPM
        run: pnpm --version

      - name: Install Dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm lint

      - name: Run Build Check
        run: pnpm build
